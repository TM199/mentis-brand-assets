<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mentis — Icon Library (24)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Inter:wght@400..600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#F2F6FB; --ink:#0F2237; --accent:#1A3A5C; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: Inter, sans-serif; padding: 48px; }
    h1 { font-family: Fraunces, serif; font-weight: 600; font-size: 2.5rem; margin: 0 0 8px; letter-spacing: -0.02em; }
    .subtitle { font-size: 15px; opacity: 0.85; margin-bottom: 48px; max-width: 60ch; line-height: 1.6; }
    .scale-header { font-family: Fraunces, serif; font-size: 1.25rem; font-weight: 500; margin: 48px 0 16px; color: var(--accent); }
    .grid { display: grid; gap: 16px; }
    .grid-256 { grid-template-columns: repeat(4, 1fr); }
    .grid-64  { grid-template-columns: repeat(8, 1fr); }
    .grid-24  { grid-template-columns: repeat(12, 1fr); }
    .cell { background: rgba(255,255,255,0.5); border-radius: 12px; padding: 24px 16px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .cell img { display: block; }
    .label { font-size: 12px; opacity: 0.85; text-transform: lowercase; letter-spacing: 0.02em; text-align: center; }
    .grid-64 .cell, .grid-24 .cell { padding: 12px 8px 10px; gap: 8px; }
    .grid-24 .label { font-size: 10px; }
    hr { border: none; border-top: 1px solid rgba(26,58,92,0.12); margin: 48px 0 0; }
  </style>
</head>
<body>
  <h1>Mentis — Icon Library</h1>
  <div class="subtitle">24 icons, Lucide-sourced, recoloured to Deep Space Blue #1A3A5C. All outline, 2px stroke, 24&times;24 grid. MIT-licensed — no attribution required.</div>

  <div class="scale-header">At 256px &mdash; detail / hero use</div>
  <div class="grid grid-256" id="grid-256"></div>

  <div class="scale-header">At 64px &mdash; UI / button use</div>
  <div class="grid grid-64" id="grid-64"></div>

  <div class="scale-header">At 24px &mdash; inline use</div>
  <div class="grid grid-24" id="grid-24"></div>

  <hr>

  <script>
    const icons = [
      "pipeline","signal","meeting","contact","research","campaign",
      "report","dashboard","message","call","email","calendar",
      "search","filter","chart-up","chart-down","target","handshake",
      "briefcase","document","checkmark","warning","insight","team"
    ];

    function buildGrid(containerId, size) {
      const container = document.getElementById(containerId);
      icons.forEach(concept => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const img = document.createElement('img');
        img.src = `icon-${concept}.svg`;
        img.width = size;
        img.height = size;
        img.alt = concept;
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = concept;
        cell.appendChild(img);
        cell.appendChild(label);
        container.appendChild(cell);
      });
    }

    buildGrid('grid-256', 256);
    buildGrid('grid-64', 64);
    buildGrid('grid-24', 24);
  </script>
</body>
</html>
