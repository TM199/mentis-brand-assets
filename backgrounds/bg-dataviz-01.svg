<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Alice Blue base -->
  <rect width="1920" height="1080" fill="#F2F6FB"/>

  <!--
    Abstract bar chart: 7 bars, rising left-to-right.
    Bar width 120px, spacing 60px, total span 7*120 + 6*60 = 1200px, centred on 1920.
    Left start: (1920-1200)/2 = 360. Baseline: y=920.
    Heights (rising rhythm with natural variation): 220, 310, 400, 480, 560, 640, 720
    Alternating Crayola Blue / Deep Space Blue
  -->

  <!-- Bar 1 -->
  <rect x="360" y="700" width="120" height="220" rx="6" fill="#2878E8" fill-opacity="0.85"/>
  <!-- Bar 2 -->
  <rect x="540" y="610" width="120" height="310" rx="6" fill="#1A3A5C" fill-opacity="0.80"/>
  <!-- Bar 3 -->
  <rect x="720" y="520" width="120" height="400" rx="6" fill="#2878E8" fill-opacity="0.80"/>
  <!-- Bar 4 -->
  <rect x="900" y="440" width="120" height="480" rx="6" fill="#1A3A5C" fill-opacity="0.75"/>
  <!-- Bar 5 -->
  <rect x="1080" y="360" width="120" height="560" rx="6" fill="#2878E8" fill-opacity="0.75"/>
  <!-- Bar 6 -->
  <rect x="1260" y="280" width="120" height="640" rx="6" fill="#1A3A5C" fill-opacity="0.70"/>
  <!-- Bar 7 — tallest -->
  <rect x="1440" y="200" width="120" height="720" rx="6" fill="#2878E8" fill-opacity="0.90"/>
</svg>
