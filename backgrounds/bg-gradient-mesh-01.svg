<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Deep Space Blue top-left to Crayola Blue bottom-right -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#2878E8"/>
    </linearGradient>

    <!-- Radial highlight centre, Alice Blue 10% for depth -->
    <radialGradient id="centreHighlight" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#F2F6FB" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F2F6FB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-canvas gradient -->
  <rect width="1920" height="1080" fill="url(#mainGrad)"/>

  <!-- Centre radial highlight -->
  <rect width="1920" height="1080" fill="url(#centreHighlight)"/>
</svg>
